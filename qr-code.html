<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code — Amira للعطور</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Pinyon+Script&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0a0a0a;--card:#141414;
      --gold:#d4af37;--gold2:#f3e5ab;--gold-deep:#a8841a;
      --grad:linear-gradient(135deg,#f3e5ab,#d4af37,#a8841a);
      --line:rgba(212,175,55,.18);--text:#ededed;--muted:#888;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      padding:24px;-webkit-font-smoothing:antialiased
    }
    .container{
      background:var(--card);border:1px solid var(--line);border-radius:24px;
      padding:48px 40px;max-width:480px;width:100%;text-align:center;
      box-shadow:0 30px 80px rgba(0,0,0,.5)
    }
    .logo{
      font-family:'Pinyon Script',cursive;font-size:56px;color:var(--gold);
      line-height:1;margin-bottom:4px
    }
    .logo-sub{
      font-size:13px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;
      font-weight:600;margin-bottom:32px
    }
    .qr-wrap{
      width:220px;height:220px;margin:0 auto 28px;
      background:#fff;border-radius:16px;
      display:flex;align-items:center;justify-content:center;overflow:hidden;
      box-shadow:0 8px 30px rgba(212,175,55,.2);border:4px solid var(--gold)
    }
    .qr-wrap img{width:100%;height:100%;object-fit:contain}
    .qr-placeholder{
      width:180px;height:180px;display:flex;align-items:center;justify-content:center;
      flex-direction:column;gap:12px;color:#333
    }
    .qr-placeholder svg{width:140px;height:140px}
    .store-name{
      font-size:22px;font-weight:800;
      background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;
      margin-bottom:8px
    }
    .store-desc{color:var(--muted);font-size:14px;line-height:1.7;margin-bottom:28px}
    .divider{height:1px;background:var(--line);margin:20px 0}
    .links-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px}
    .link-btn{
      display:flex;flex-direction:column;align-items:center;gap:8px;
      padding:18px 12px;border-radius:14px;border:1.5px solid var(--line);
      background:rgba(255,255,255,.02);transition:.25s;cursor:pointer;text-decoration:none;color:var(--text)
    }
    .link-btn:hover{border-color:var(--gold);background:rgba(212,175,55,.07);transform:translateY(-3px)}
    .link-btn i{font-size:28px}
    .link-btn span{font-size:12px;font-weight:700;color:var(--muted)}
    .link-btn.wa i{color:#25d366}
    .link-btn.tk i{color:#fff}
    .link-btn.sn i{color:#fffc00}
    .link-btn.em i{color:var(--gold)}
    .footer-note{
      font-size:12px;color:var(--muted);
      background:rgba(212,175,55,.05);border:1px solid var(--line);
      border-radius:10px;padding:12px 16px;line-height:1.7
    }
    .footer-note strong{color:var(--gold)}
    .pay-row{
      display:flex;align-items:center;justify-content:center;gap:16px;
      margin-top:20px;font-size:13px;color:var(--muted)
    }
    .pay-row i{font-size:26px;color:#bbb}
    .pay-row i.cod-icon{color:#33d27a;font-size:20px}
    @media print{
      body{background:#fff;padding:0}
      .container{box-shadow:none;border:none;background:#fff;color:#000}
      .link-btn,.store-desc,.divider,.pay-row{display:none}
      .logo,.store-name{color:#000;-webkit-text-fill-color:#000}
    }
    @media (max-width:480px){
      .container{padding:32px 20px}
      .logo{font-size:42px}
      .qr-wrap{width:180px;height:180px}
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

      </svg>
    </div>
  </div>

  <div class="store-name">Amira للعطور</div>

<script>
  // Auto-set QR image if URL param provided: ?url=...
  (function () {
    const params = new URLSearchParams(location.search);
    const qrUrl = params.get('qr');
    const siteUrl = params.get('url');
    if (qrUrl) {
      const wrap = document.getElementById('qrWrap');
      const img = document.createElement('img');
      img.src = decodeURIComponent(qrUrl);
      img.alt = 'QR Code';
      img.width = 220;
      img.height = 220;
      wrap.innerHTML = '';
      wrap.appendChild(img);
    }
    if (siteUrl) {
      // Could generate QR dynamically via API
      const apiUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=' + encodeURIComponent(decodeURIComponent(siteUrl));
      const wrap = document.getElementById('qrWrap');
      const img = document.createElement('img');
      img.src = apiUrl;
      img.alt = 'QR Code للمتجر';
      img.width = 220;
      img.height = 220;
      img.onerror = function () { img.style.display = 'none'; };
      wrap.innerHTML = '';
      wrap.appendChild(img);
    }
  }());
</script>
</body>
</html>
